    function initLocalizedContent() {
        const urlParams = new URLSearchParams(window.location.search);
        let currentLang = urlParams.get('lang');

        // --- CƠ CHẾ ĐÁ LINK TỰ ĐỘNG KHÔNG CẦN NÚT BẤM ---
        if (!currentLang) {
            const browserLang = (navigator.language || navigator.userLanguage).toLowerCase();
            
            if (browserLang.includes('th')) currentLang = 'Thai';
            else if (browserLang.includes('id')) currentLang = 'Indonesian';
            else if (browserLang.includes('fil') || browserLang.includes('tl')) currentLang = 'Philippines';
            else currentLang = 'Vietnamese'; // Mặc định chuyển vùng về Việt Nam
            
            // Ép trình duyệt chuyển hướng ngay lập tức sang URL chứa vùng ngôn ngữ tương ứng
            window.location.search = `?lang=${currentLang}`;
            return; 
        }

        // Đảm bảo dữ liệu tồn tại, nếu gọi params lỗi thì ép về Việt Nam
        if (!eventLocalization[currentLang]) currentLang = 'Vietnamese';

        // Đổ dữ liệu đã dịch thuật vào giao diện HTML mẫu duy nhất
        const data = eventLocalization[currentLang];
        
        document.getElementById('btn-back').innerHTML = data.back;
        document.getElementById('txt-main-title').innerHTML = data.title;
        document.getElementById('txt-time-line').innerHTML = data.date;
        document.getElementById('txt-intro-desc').innerHTML = data.intro;
        
        document.getElementById('h-sec-1').innerHTML = data.h1;
        document.getElementById('txt-sec-1').innerHTML = data.p1;
        
        document.getElementById('h-sec-2').innerHTML = data.h2;
        document.getElementById('txt-sec-2').innerHTML = data.p2;
        
        document.getElementById('h-sec-3').innerHTML = data.h3;
        document.getElementById('txt-sec-3').innerHTML = data.p3;
        
        document.getElementById('h-sec-4').innerHTML = data.h4;
        document.getElementById('txt-sec-4').innerHTML = data.p4;
        
        document.getElementById('h-sec-5').innerHTML = data.h5;
        document.getElementById('txt-sec-5').innerHTML = data.p5;
        
        document.getElementById('h-sec-6').innerHTML = data.h6;
        document.getElementById('txt-sec-6').innerHTML = data.p6;
        
        document.getElementById('h-sec-7').innerHTML = data.h7;
        document.getElementById('txt-sec-7').innerHTML = data.p7;
        
        document.getElementById('txt-note-box').innerHTML = data.note;
        document.getElementById('txt-footer-sign').innerHTML = data.footer;
        
        // Đổi tiêu đề tab của trình duyệt cho đồng bộ quốc gia
        document.title = data.title;
    }

    // Chạy khi cây cấu trúc DOM của trang hoàn thành tải
    window.addEventListener('DOMContentLoaded', initLocalizedContent);
</script>
