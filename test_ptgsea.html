            justify-content: center;

            width: 100%; 
            height: auto; 
            display: block;

        .sudo-btn {
            position: absolute;

            background: #fff; 
            color: #333; 
            padding: 8px 20px; 
            border-radius: 30px; 
            font-weight: 900; 
            font-size: clamp(13px, 3vw, 16px); 
            box-shadow: 0 4px 0 #999; 
            z-index: 20; 
            text-decoration: none !important;
        }

        .slide-counter {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            background: rgba(0,0,0,0.6); color: white; padding: 3px 12px; 
            border-radius: 20px; font-size: 14px;

        .old-news { display: none; }
        #btn-more { cursor: pointer; font-weight: bold; text-align: center; color: #888; background: #f9f9f9; width: 100%; }
        
        .test-box {
            max-width: 1140px;
            margin: 40px auto;
            padding: 40px;
            background: #fff;
            border-radius: 12px;

        const bannerImages = [

            "https://ddienxptg.github.io/notice.ptgvng.com/Kaia_Island_artifacts-1.png"
        ];

        let swiperInstance = null;

        function initPage() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Xử lý kịch bản nếu bấm vào các bài viết giả lập chạy thử nghiệm
            if (urlParams.get('content') === 'test_sea') {
                document.getElementById('hub-view').style.display = 'none';
                document.getElementById('test-view').style.display = 'block';
                document.getElementById('nav-title').innerText = "TEST MODE";
                return;
            }

            let currentLang = urlParams.get('lang');

            // --- TỰ ĐỘNG CHUYỂN VÙNG THÔNG MINH CHO CẢ 4 QUỐC GIA ---
            if (!currentLang) {
                const browserLang = (navigator.language || navigator.userLanguage).toLowerCase();
                
                if (browserLang.includes('th')) currentLang = 'Thai';
                else if (browserLang.includes('id')) currentLang = 'Indonesian';
                else if (browserLang.includes('fil') || browserLang.includes('tl')) currentLang = 'Philippines';
                else currentLang = 'Vietnamese'; // Mặc định chuyển vùng
                
                window.location.search = `?lang=${currentLang}`;
                return; 
            }

            if (!localizationData[currentLang]) currentLang = 'Vietnamese';

            document.getElementById('nav-title').innerText = localizationData[currentLang].navTitle;

            // Render Banner Slider
            const swiperWrapper = document.getElementById('dynamic-swiper-wrapper');
            swiperWrapper.innerHTML = bannerImages.map(imgUrl => `
                <div class="swiper-slide">
                    <a href="#" style="width: 100%;"><img src="${imgUrl}"></a>
                </div>
            `).join('');

            if (swiperInstance) swiperInstance.destroy(true, true);
            swiperInstance = new Swiper('.swiper', {
                loop: true,
                autoHeight: true,
                speed: 800,
                autoplay: { delay: 3000, disableOnInteraction: false },
                on: {
                    init: function () { document.getElementById('total').innerText = bannerImages.length; },
                    slideChange: function () { document.getElementById('curr').innerText = this.realIndex + 1; },
                },
            });

            // Render danh sách tin tức dựa theo tệp bản địa hóa vùng miền
            const primaryContainer = document.getElementById('primary-news-list');
            const oldContainer = document.getElementById('old-news-box');
            primaryContainer.innerHTML = '';
            oldContainer.innerHTML = '';

            localizationData[currentLang].news.forEach(item => {
                const itemHtml = `
                    <a href="${item.url}" class="list-group-item">
                        <div class="news-title" style="${item.isNew ? 'color: red;' : ''}">${item.title}</div>
                        <small class="text-secondary">${item.date} (UTC +7)</small>
                    </a>
                `;
                if (item.isNew) primaryContainer.innerHTML += itemHtml;
                else oldContainer.innerHTML += itemHtml;
            });

            const btnMore = document.getElementById('btn-more');
            btnMore.innerText = localizationData[currentLang].moreBtn;
            btnMore.onclick = function() {
                if (oldContainer.style.display === 'block') {
                    oldContainer.style.display = 'none';
                    this.innerText = localizationData[currentLang].moreBtn;
                } else {
                    oldContainer.style.display = 'block';
                    this.innerText = localizationData[currentLang].lessBtn;
                }
            };
        }

        window.addEventListener('DOMContentLoaded', initPage);
    </script>
